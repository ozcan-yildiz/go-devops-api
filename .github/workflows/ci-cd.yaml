name: Production-Ready Go CI-CD (Restricted Access)

on:
  push:
    branches: [ "main" ]

jobs:
  # STAGE 1: Automated Quality Control
  qa-testing:
    name: Code Quality and Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Go Development Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run Static Analysis (Linter)
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          skip-cache: true

      - name: Run Unit Tests with Race Detection
        run: go test -v -race -coverprofile=coverage.txt ./...

  # STAGE 2: Secure Delivery to AWS ECR
  delivery-to-ecr:
    name: Package and Push to AWS ECR
    needs: qa-testing
    runs-on: ubuntu-latest
    # Requires manual approval in GitHub UI
    environment: production 

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure Restricted AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Authenticate with Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: go-devops-api
          TAG: ${{ github.sha }}
        run: |
          # Build image with dual tags
          docker build -t $REGISTRY/$REPOSITORY:$TAG -t $REGISTRY/$REPOSITORY:latest .
          # Push specific version and latest tag
          docker push $REGISTRY/$REPOSITORY:$TAG
          docker push $REGISTRY/$REPOSITORY:latest